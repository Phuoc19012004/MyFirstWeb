<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    
    <!-- 🎯 TIÊU ĐỀ HIỂN THỊ TRÊN GOOGLE KHI TÌM KIẾM -->
    <title>Đồ Án Sinh Viên Phạm Hoàng Phước</title>

    <!-- 🔍 CÁC TỪ KHÓA VÀ MÔ TẢ ĐỂ GOOGLE NHẬN DIỆN "PHAM HOANG PHUOC , ĐỒ ÁN" -->
    <meta name="description" content="Hệ thống lưu trữ và hiển thị Đồ Án Sinh Viên của Phạm Hoàng Phước. Cập nhật các dự án nghiên cứu mới nhất năm 2026.">
    <meta name="keywords" content="Phạm Hoàng Phước, pham hoang phuoc, đồ án, do an, đồ án sinh viên, pham hoang phuoc do an">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f5e9;
        }

        .campus-background {
            /* Hình ảnh trường đại học, cây xanh, đường xá */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .content-box {
            background-color: rgba(255, 255, 255, 0.85); /* Hiệu ứng kính mờ */
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        h1 {
            color: #1b5e20; /* Màu xanh lá đậm */
            font-size: 3em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #2e7d32;
            font-size: 1.5em;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .description {
            color: #424242;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 0;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            color: #ffffff;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Thêm hiệu ứng đèn đường sáng lên vào buổi tối nếu muốn */
        .street-lights {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: radial-gradient(circle at 20% 60%, rgba(255, 220, 100, 0.15) 0%, transparent 20%),
                        radial-gradient(circle at 80% 60%, rgba(255, 220, 100, 0.15) 0%, transparent 20%);
        }
    </style>
</head>
